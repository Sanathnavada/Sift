<div class="section-head section-head--compact">
  <h3>Instagram post</h3>
  <p>Paste a direct post, reel, or carousel URL. Sift detects the media shape and routes images to OCR, videos to transcription, or both.</p>
</div>
<form class="stack-form" hx-post="/ui/media/post/submit" hx-target="#media-instagram-posts-task-panel" hx-swap="innerHTML" hx-disabled-elt="find button" hx-indicator="find .submit-indicator">
  <div class="field">
    <label class="label" for="media-post-url">Instagram URL</label>
    <input class="input" type="text" id="media-post-url" name="url" placeholder="https://www.instagram.com/p/.../ or /reel/.../">
  </div>
  <button class="button button--wide" type="submit">Process Media</button>
  <span class="submit-indicator" aria-live="polite">Submitting...</span>
</form>
