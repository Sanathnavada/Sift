<div class="section-head section-head--compact">
  <h3>Private collection</h3>
  <p>Use this for saved Instagram collections. Since saved collections are private, this mode requires a connected session.</p>
</div>
<div
  id="instagram-auth-panel"
  hx-get="/ui/media/instagram/auth/panel"
  hx-trigger="load"
  hx-swap="innerHTML">
</div>
<form class="stack-form" hx-post="/ui/media/private-user/submit" hx-target="#media-instagram-private-collection-task-panel" hx-swap="innerHTML" hx-disabled-elt="find button" hx-indicator="find .submit-indicator">
  <div class="field">
    <label class="label" for="media-private-collection">Collection name</label>
    <input class="input" type="text" id="media-private-collection" name="collection" placeholder="Mind">
  </div>
  <button class="button button--wide" type="submit">Process Collection</button>
  <span class="submit-indicator" aria-live="polite">Submitting...</span>
</form>
