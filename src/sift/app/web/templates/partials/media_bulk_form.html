<div class="section-head section-head--compact">
  <h3>Bulk Instagram URLs</h3>
  <p>Paste multiple post, reel, or carousel URLs. Each input is normalized and routed through the same OCR/transcription pipeline.</p>
</div>
<form class="stack-form" hx-post="/ui/media/bulk/submit" hx-target="#media-instagram-posts-task-panel" hx-swap="innerHTML" hx-disabled-elt="find button" hx-indicator="find .submit-indicator">
  <div class="field">
    <label class="label" for="media-bulk-urls">URLs</label>
    <textarea class="textarea" id="media-bulk-urls" name="urls_text" rows="6" placeholder="One Instagram URL per line"></textarea>
  </div>
  <button class="button button--wide" type="submit">Start Media Batch</button>
  <span class="submit-indicator" aria-live="polite">Submitting...</span>
</form>
