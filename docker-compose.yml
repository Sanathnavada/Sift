services:
  gateway:
    build: .
    env_file:
      - path: .env.docker
        required: false
    ports:
      - "8000:8000"
      - "6080:6080"
    environment:
      SIFT_ROOT: /app
      PYTHONPATH: /app/src
      DISPLAY: ":99"
      NOVNC_ENABLED: "true"
      NOVNC_CLEAN_UI: "true"
      INSTAGRAM_AUTH_BROWSER_ENABLED: "true"
      INSTAGRAM_AUTH_TIMEOUT_SECONDS: "300"
      INSTAGRAM_BROWSER_CLEAN_UI: "true"
      INSTAGRAM_BROWSER_WIDTH: "1920"
      INSTAGRAM_BROWSER_HEIGHT: "1080"
      NOVNC_PUBLIC_URL: "http://localhost:6080/vnc_clean.html?autoconnect=true&resize=scale&quality=9&compression=0&reconnect=true"
      NOVNC_PORT: "6080"
      VNC_PORT: "5900"
      VNC_RESOLUTION: "1920x1080x24"
      HF_HOME: /app/var/model_cache/huggingface
      HF_HUB_CACHE: /app/var/model_cache/huggingface/hub
      HF_HUB_ETAG_TIMEOUT: "10"
      HF_HUB_DOWNLOAD_TIMEOUT: "30"
      HF_HUB_DISABLE_TELEMETRY: "1"
      TORCH_HOME: /app/var/model_cache/torch
      XDG_CACHE_HOME: /app/var/model_cache
      MUSIC_CONFIG_DIR: /app/var/music_config
    volumes:
      - gateway-var:/app/var
      - gateway-downloads:/app/downloads
    shm_size: "2gb"
    restart: unless-stopped

volumes:
  gateway-var:
  gateway-downloads:
