<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Gateway Console{% endblock %}</title>
  <link rel="stylesheet" href="/static/css/app.css?v=spotify-library-list-3">
  <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>
  <script src="/static/js/app.js?v=spotify-auth-memory-2" defer></script>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <a class="brand" href="/">
        <span class="brand__eyebrow">WELCOME TO</span>
        <span class="brand__title">INNER-NET</span>
      </a>

      <nav class="topnav">
        <a href="/" class="topnav__link {% if active_page == 'home' %}is-active{% endif %}">Home</a>
        <a href="/telegram" class="topnav__link {% if active_page == 'telegram' %}is-active{% endif %}">Telegram</a>
        <a href="/media" class="topnav__link {% if active_page == 'media' %}is-active{% endif %}">Media</a>
        <a href="/music" class="topnav__link {% if active_page == 'music' %}is-active{% endif %}">Music</a>
      </nav>

      <div class="topbar__actions">
        <a class="button button--ghost" href="/docs" target="_blank" rel="noreferrer">API Docs</a>
        <a class="button button--ghost" href="{{ github_url }}" target="_blank" rel="noreferrer">GitHub</a>
      </div>
    </header>

    <main class="page-shell">
      {% block content %}{% endblock %}
    </main>

    <footer class="footer">
      <span>One gateway. Three engines. Local-first automation.</span>
      <span class="footer__muted">FastAPI + HTMX + server-rendered templates</span>
    </footer>
  </div>
</body>
</html>
