<div class="section-head section-head--compact">
  <h3>YouTube</h3>
  <p>Transcribe one or more YouTube inputs into structured text outputs.</p>
</div>
<form class="stack-form" hx-post="/ui/media/youtube/submit" hx-target="#media-youtube-task-panel" hx-swap="innerHTML" hx-disabled-elt="find button" hx-indicator="find .submit-indicator">
  <div class="field">
    <label class="label" for="media-youtube-input">YouTube URL or input</label>
    <input class="input" type="text" id="media-youtube-input" name="input" placeholder="https://youtu.be/example or a direct input">
  </div>
  <div class="field">
    <label class="label" for="media-youtube-batch">Batch inputs</label>
    <textarea class="textarea" id="media-youtube-batch" name="inputs_text" rows="4" placeholder="One input per line"></textarea>
  </div>
  <button class="button button--wide" type="submit">Submit Job</button>
  <span class="submit-indicator" aria-live="polite">Submitting...</span>
</form>
