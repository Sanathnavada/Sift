<div class="section-head section-head--compact">
  <h3>YouTube Link</h3>
  <p>Download audio from direct YouTube URLs or search-oriented inputs.</p>
</div>
<form class="stack-form" hx-post="/ui/music/youtube/submit" hx-target="#music-task-panel" hx-swap="innerHTML" hx-disabled-elt="find button" hx-indicator="find .submit-indicator">
  <div class="field">
    <label class="label" for="music-yt-input">YouTube URL or input</label>
    <input class="input" type="text" id="music-yt-input" name="input" placeholder="https://youtu.be/_yhBlE3D9cc">
  </div>
  <div class="field">
    <label class="label" for="music-yt-batch">Batch inputs</label>
    <textarea class="textarea" id="music-yt-batch" name="inputs_text" rows="5" placeholder="One input per line"></textarea>
  </div>
  <div class="field">
    <label class="label" for="music-yt-file">Input file path</label>
    <input class="input" type="text" id="music-yt-file" name="input_file" placeholder="./data/yt_inputs.txt">
  </div>
  <div class="field-group" data-output-mode-group>
    <span class="label">Output mode</span>
    <div class="choice-row">
      <label class="choice"><input type="radio" name="output_mode" value="temporary" checked> Temporary artifacts</label>
      <label class="choice"><input type="radio" name="output_mode" value="persistent"> Persistent outdir</label>
    </div>
  </div>
  <div class="field is-hidden" data-outdir-field>
    <label class="label" for="music-yt-outdir">Output directory</label>
    <input class="input" type="text" id="music-yt-outdir" name="outdir" placeholder="./downloads/yt_audio">
  </div>
  <button class="button button--wide" type="submit">Resolve and Download</button>
  <span class="submit-indicator" aria-live="polite">Submitting...</span>
</form>
