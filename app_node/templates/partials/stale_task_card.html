<article class="task-card task-card--stale">
  <div class="task-card__header">
    <div>
      <span class="task-card__kicker">Task Unavailable</span>
      <h3>Job no longer active</h3>
    </div>
    <span class="status-pill status-pill--warning">stale</span>
  </div>

  <div class="callout">
    <strong>Polling stopped</strong>
    <p>This job is no longer in the active queue, usually because the server restarted or the task was cleaned up. Submit a fresh job to continue.</p>
  </div>
</article>
