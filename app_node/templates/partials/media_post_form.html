<div class="section-head section-head--compact">
  <h3>Instagram Post</h3>
  <p>Fetch and process a single public Instagram post.</p>
</div>
<form class="stack-form" hx-post="/ui/media/post/submit" hx-target="#media-task-panel" hx-swap="innerHTML" hx-disabled-elt="find button" hx-indicator="find .submit-indicator">
  <div class="field">
    <label class="label" for="media-post-url">Instagram post URL</label>
    <input class="input" type="text" id="media-post-url" name="url" placeholder="https://www.instagram.com/p/.../">
  </div>
  <div class="field-group" data-output-mode-group>
    <span class="label">Output mode</span>
    <div class="choice-row">
      <label class="choice"><input type="radio" name="output_mode" value="temporary" checked> Temporary artifacts</label>
      <label class="choice"><input type="radio" name="output_mode" value="persistent"> Persistent outdir</label>
    </div>
  </div>
  <div class="field is-hidden" data-outdir-field>
    <label class="label" for="media-post-outdir">Output directory</label>
    <input class="input" type="text" id="media-post-outdir" name="outdir" placeholder="./data/posts">
  </div>
  <button class="button button--wide" type="submit">Process Post</button>
  <span class="submit-indicator" aria-live="polite">Submitting...</span>
</form>
