<div class="section-head section-head--compact">
  <h3>Clean Output</h3>
  <p>Run an existing raw bulk file through the LLM cleaner.</p>
</div>
<form class="stack-form" hx-post="/ui/media/clean/submit" hx-target="#media-task-panel" hx-swap="innerHTML" hx-disabled-elt="find button" hx-indicator="find .submit-indicator">
  <div class="field">
    <label class="label" for="media-clean-file">Source file path</label>
    <input class="input" type="text" id="media-clean-file" name="file_path" placeholder="./data/my_collections/test.txt">
  </div>
  <button class="button button--wide" type="submit">Clean File</button>
  <span class="submit-indicator" aria-live="polite">Submitting...</span>
</form>
